steps:
  # 🔍 DEBUG: show actual working directory + files
  - name: 'alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "=== DEBUG START ==="
        echo "PWD:"
        pwd
        echo "FILES:"
        ls -R
        echo "=== DEBUG END ==="

  # 🐳 Build image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t', 'gcr.io/$PROJECT_ID/dotnet-app',
        '-f', './courier/Dockerfile',
        './courier'
      ]

  # 📦 Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'gcr.io/$PROJECT_ID/dotnet-app'
      ]

  # 🚀 Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      [
        'run', 'deploy', 'dotnet-app',
        '--image', 'gcr.io/$PROJECT_ID/dotnet-app',
        '--region', 'asia-southeast1',
        '--platform', 'managed',
        '--allow-unauthenticated'
      ]

images:
  - 'gcr.io/$PROJECT_ID/dotnet-app'